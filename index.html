<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" id="meta-desc" content="UBE RAW | Art & Design Studio">
    
    <title id="site-title">UBE RAW | Art & Design Studio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;500&family=Inter:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --text: #e5e5e5; --bronze: #a87f4a; --border: #1e1e1e; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        
        #maintenance-screen { position: fixed; inset: 0; background: #000; z-index: 999999; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #maintenance-screen h1 { font-family: 'Cormorant Garamond', serif; color: var(--bronze); letter-spacing: 10px; margin-bottom: 10px; text-transform: uppercase; }
        #maintenance-screen p { color: #666; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; }

        nav { padding: 30px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--bronze); background: #000; position: sticky; top:0; z-index: 1000; flex-wrap: wrap; gap: 15px; }
        .logo h1 { font-family: 'Cormorant Garamond', serif; font-size: 26px; letter-spacing: 6px; margin: 0; color: var(--bronze); text-transform: uppercase; cursor: pointer; }
        
        .social-links { display: flex; gap: 20px; }
        .social-links a { color: #666; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; text-decoration: none; transition: 0.3s; }
        .social-links a:hover { color: var(--bronze); }

        #news-bar { background: var(--bronze); color: #000; padding: 10px 5%; font-size: 11px; font-weight: bold; text-align: center; display: none; text-transform: uppercase; }
        
        .bio-sec { padding: 40px 5%; text-align: center; max-width: 700px; margin: 0 auto; color: #999; font-size: 13px; line-height: 1.8; display: none; }
        
        .filters { padding: 20px 5%; display: flex; gap: 25px; overflow-x: auto; border-bottom: 1px solid var(--border); background: #0d0d0d; }
        .filter-btn { color: #666; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s; white-space: nowrap; padding-bottom: 5px; }
        .filter-btn.active { color: var(--bronze); border-bottom: 1px solid var(--bronze); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 40px; padding: 40px 5%; min-height: 400px; }
        .artwork { border: 1px solid var(--border); transition: 0.4s; background: #000; position: relative; }
        .artwork:hover { border-color: var(--bronze); transform: translateY(-5px); }
        .img-wrapper { aspect-ratio: 1/1; overflow: hidden; cursor: zoom-in; background: #111; }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: 1s; }
        .info { padding: 25px; border-top: 1px solid var(--border); }
        .info h3 { font-family: 'Cormorant Garamond', serif; font-size: 20px; margin: 0; color: #fff; }
        .info p { font-size: 9px; color: var(--bronze); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 2px; }
        .sale-tag { background: var(--bronze); color: #000; font-size: 10px; padding: 5px 12px; position: absolute; top: 15px; right: 15px; font-weight: bold; }
        .cert-sec { padding: 60px 5%; background: #050505; border-top: 1px solid var(--border); text-align: center; }
        .cert-box { max-width: 500px; margin: 0 auto; border: 1px dashed var(--bronze); padding: 40px; margin-bottom: 40px; }
        input, textarea { background: #000; border: 1px solid #333; color: #fff; padding: 12px; width: 80%; text-align: center; margin-bottom: 15px; font-family: inherit; }
        .btn-bronze { background: var(--bronze); border: none; padding: 12px 30px; color: #000; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        
        .guestbook-sec { padding: 40px 5%; border-top: 1px solid var(--border); text-align: center; max-width: 800px; margin: 0 auto; }
        .guest-entry { padding: 20px; border-bottom: 1px solid #111; margin-bottom: 10px; font-size: 14px; line-height: 1.6; }
        .guest-entry small { color: var(--bronze); display: block; margin-top: 5px; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; }

        #lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; justify-content: center; align-items: center; z-index: 10000; }
        #lightbox img { max-width: 95vw; max-height: 90vh; border: 1px solid var(--bronze); }
        footer { padding: 40px 5%; text-align: center; color: #444; font-size: 10px; letter-spacing: 4px; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="maintenance-screen">
    <h1>YAPIM AŞAMASINDA</h1>
    <p>Çok yakında yeni eserlerle karşınızdayız.</p>
</div>

<div id="news-bar"></div>
<nav>
    <div class="logo" id="logo-wrap" onclick="location.reload()"><h1>UBE RAW</h1></div>
    <div style="font-size: 9px; letter-spacing: 5px; color: var(--bronze);">SCULPTURE STUDIO</div>
    <div class="social-links" id="social-nav"></div>
</nav>

<div class="bio-sec" id="bio-sec"></div>

<div class="filters" id="cat-nav"></div>
<div class="grid" id="main-grid"></div>

<section class="cert-sec">
    <div class="cert-box">
        <h2 style="font-family:'Cormorant Garamond'; color:var(--bronze); letter-spacing: 3px;">VERIFICATION</h2>
        <input type="text" id="cert-input" placeholder="SERTİFİKA KODU">
        <br>
        <button class="btn-bronze" onclick="checkCert()">SORGULA</button>
        <div id="cert-result" style="margin-top:20px;"></div>
    </div>

    <div class="cert-box" style="border-style: solid; border-width: 1px;">
        <h2 style="font-family:'Cormorant Garamond'; color:var(--bronze); letter-spacing: 3px;">GUESTBOOK</h2>
        <input type="text" id="g-name" placeholder="İSMİNİZ">
        <textarea id="g-msg" rows="3" placeholder="MESAJINIZ"></textarea>
        <br>
        <button class="btn-bronze" id="send-btn" onclick="sendGuest()">MESAJI GÖNDER</button>
    </div>
</section>

<div class="guestbook-sec" id="guestbook-list"></div>

<div id="lightbox" onclick="this.style.display='none'"><img id="l-img"></div>
<footer id="footer-copy">UBE RAW ART & DESIGN</footer>

<script>
    const base = "/uberaw/";
    let allWorks = [];

    async function fetchData(fileName) {
        try {
            const r = await fetch(`${base}${fileName}?v=${Math.random()}`);
            if (!r.ok) return null;
            return await r.json();
        } catch (e) {
            console.warn(`${fileName} okunamadı.`);
            return null;
        }
    }

    async function init() {
        const settings = await fetchData('content/settings.json') || {};
        const portfolio = await fetchData('content/portfolio.json') || { projects: [] };
        const news = await fetchData('content/news.json') || { announcements: [], guestbook: [] };

        if (settings.maintenanceMode) {
            document.getElementById('maintenance-screen').style.display = 'flex';
            document.body.style.overflow = 'hidden';
            return;
        }

        if (settings.siteTitle) document.getElementById('site-title').innerText = settings.siteTitle;
        if (settings.siteDesc) document.getElementById('meta-desc').content = settings.siteDesc;
        document.getElementById('footer-copy').innerText = settings.footerText || "UBE RAW © 2026";

        if (settings.analyticsId) {
            const script = document.createElement('script');
            script.src = `https://www.googletagmanager.com/gtag/js?id=${settings.analyticsId}`;
            script.async = true;
            document.head.appendChild(script);
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());
            gtag('config', settings.analyticsId);
        }

        if (settings.bio && settings.bio.trim() !== "") {
            const bioSec = document.getElementById('bio-sec');
            bioSec.innerHTML = settings.bio.replace(/\n/g, '<br>');
            bioSec.style.display = 'block';
        }

        // SOSYAL MEDYA LİNK DÜZELTMESİ
        let socialHTML = "";
        if (settings.instagram) {
            let igLink = settings.instagram.trim();
            if(!igLink.startsWith('http')) igLink = 'https://instagram.com/' + igLink;
            socialHTML += `<a href="${igLink}" target="_blank" rel="noopener">INSTAGRAM</a>`;
        }
        if (settings.whatsapp) {
            let waNum = settings.whatsapp.replace(/[^0-9]/g, '');
            socialHTML += `<a href="https://wa.me/${waNum}" target="_blank" rel="noopener">WHATSAPP</a>`;
        }
        document.getElementById('social-nav').innerHTML = socialHTML;

        allWorks = portfolio.projects || [];

        if(news.announcements?.length) {
            const nb = document.getElementById('news-bar');
            nb.style.display = 'block';
            nb.innerText = news.announcements[0].title + ": " + news.announcements[0].body;
        }

        if(news.guestbook?.length) {
            document.getElementById('guestbook-list').innerHTML = `
                <h3 style="font-family:'Cormorant Garamond'; color:#666; font-size:14px; letter-spacing:4px; margin-bottom:30px;">THOUGHTS</h3>
                ` + news.guestbook.map(g => `
                <div class="guest-entry">
                    "${g.message}"
                    <small>— ${g.name}</small>
                </div>
            `).reverse().join('');
        }

        const cats = ['HEPSİ', ...new Set(allWorks.map(w => w.category))];
        document.getElementById('cat-nav').innerHTML = cats.map(c => `
            <span class="filter-btn" onclick="render('${c}', this)">${c}</span>
        `).join('');

        render('HEPSİ');
    }

    function render(cat, btn) {
        if(btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        const filtered = cat === 'HEPSİ' ? allWorks : allWorks.filter(w => w.category === cat);
        const grid = document.getElementById('main-grid');
        
        if(filtered.length === 0) {
            grid.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:#555;">Henüz eser eklenmemiş.</p>`;
            return;
        }

        grid.innerHTML = filtered.map(w => `
            <div class="artwork">
                ${w.isSale ? `<div class="sale-tag">${w.price || 'Fiyat Alınız'}</div>` : ''}
                <div class="img-wrapper" onclick="openL('${base}${w.image}')">
                    <img src="${base}${w.image}" onerror="this.src='https://via.placeholder.com/600?text=Resim+Yukleniyor...'">
                </div>
                <div class="info">
                    <p>${w.category}</p>
                    <h3>${w.title}</h3>
                </div>
            </div>
        `).reverse().join('');
    }

    async function sendGuest() {
        const name = document.getElementById('g-name').value.trim();
        const msg = document.getElementById('g-msg').value.trim();
        const btn = document.getElementById('send-btn');
        const endpoint = "https://formspree.io/f/mjgjewqn"; 

        if(!name || !msg) return alert("Lütfen isim ve mesaj alanını doldurun.");
        
        btn.innerText = "GÖNDERİLİYOR...";
        btn.disabled = true;

        try {
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({ name: name, message: msg })
            });

            if (response.ok) {
                alert("Mesajınız iletildi. Onaylandıktan sonra yayına alınacaktır. Teşekkürler!");
                document.getElementById('g-name').value = "";
                document.getElementById('g-msg').value = "";
            } else {
                alert("Bir hata oluştu, lütfen tekrar deneyin.");
            }
        } catch (e) {
            alert("Bağlantı hatası.");
        } finally {
            btn.innerText = "MESAJI GÖNDER";
            btn.disabled = false;
        }
    }

    function openL(s) { document.getElementById('l-img').src = s; document.getElementById('lightbox').style.display = 'flex'; }

    function checkCert() {
        const val = document.getElementById('cert-input').value.trim().toUpperCase();
        const match = allWorks.find(w => w.certCode?.toUpperCase() === val);
        document.getElementById('cert-result').innerHTML = match ? 
            `<span style="color:#4CAF50;">✔ DOĞRULANDI: ${match.title}</span>` : 
            `<span style="color:#ff4444;">✘ KAYIT BULUNAMADI</span>`;
    }

    init();
</script>
</body>
</html>
