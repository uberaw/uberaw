<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UBE RAW | Art & Design Studio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400;600&display=swap" rel="stylesheet">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <style>
        :root {
            --bg: #050505;
            --surface: #0f0f0f;
            --text: #f8f8f8;
            --accent: #cd7f32;
            --gray: #666;
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        html { scroll-behavior: smooth; overflow-x: hidden; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; transition: background 0.5s ease; }

        /* TICKER */
        .news-ticker {
            position: fixed; top: 0; left: 0; width: 100%; height: 30px;
            background: var(--accent); color: #000; z-index: 1100;
            display: none; align-items: center; overflow: hidden;
            font-size: 0.65rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
        }
        .ticker-content { display: inline-block; white-space: nowrap; padding-left: 100%; animation: ticker 25s linear infinite; }
        @keyframes ticker { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        /* NAV */
        nav {
            position: fixed; top: 0; width: 100%; padding: 25px 5%;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05); transition: top 0.3s;
        }
        body.has-ticker nav { top: 30px; }

        .logo { font-size: 1.4rem; font-weight: 600; letter-spacing: 8px; color: var(--accent); text-decoration: none; text-transform: uppercase; transition: var(--transition); }
        .nav-links a { color: var(--text); text-decoration: none; margin-left: 25px; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 300; transition: var(--transition); }
        .nav-links a:hover { color: var(--accent); }

        section { padding: 120px 8%; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        .section-title { font-size: 1.8rem; color: var(--accent); margin-bottom: 50px; text-transform: uppercase; letter-spacing: 8px; text-align: center; }

        /* FILTERS */
        .filter-wrap { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; flex-wrap: wrap; }
        .filter-btn { 
            background: transparent; border: 1px solid #333; color: var(--gray); 
            padding: 8px 20px; font-size: 0.6rem; letter-spacing: 2px; cursor: pointer; 
            text-transform: uppercase; transition: var(--transition);
        }
        .filter-btn.active, .filter-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* PORTFOLIO */
        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .portfolio-item { position: relative; height: 450px; overflow: hidden; background: var(--surface); border: 1px solid #1a1a1a; transition: var(--transition); }
        .portfolio-item img { width: 100%; height: 100%; object-fit: cover; transition: var(--transition); filter: grayscale(100%); }
        .portfolio-item:hover img { transform: scale(1.05); filter: grayscale(0%); }
        .portfolio-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); display: flex; flex-direction: column; justify-content: flex-end; padding: 30px; opacity: 0; transition: var(--transition); }
        .portfolio-item:hover .portfolio-overlay { opacity: 1; }
        .portfolio-overlay h3 { font-size: 0.9rem; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 5px; }

        .viewer-container { width: 100%; height: 600px; background: #000; border: 1px solid #1a1a1a; }
        
        footer { padding: 80px 5%; text-align: center; border-top: 1px solid #111; }
        .social-links { margin-bottom: 20px; }
        .social-links a { color: var(--text); margin: 0 15px; text-decoration: none; font-size: 0.7rem; letter-spacing: 2px; opacity: 0.6; transition: 0.3s; }
        .social-links a:hover { opacity: 1; color: var(--accent); }
        .copy { font-size: 0.55rem; color: #444; letter-spacing: 2px; text-transform: uppercase; }

        @media (max-width: 768px) { .nav-links { display: none; } .portfolio-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body id="top">

    <div class="news-ticker" id="ticker-bar">
        <div class="ticker-content" id="ticker-text">UBE RAW NEWS</div>
    </div>

    <nav>
        <a href="#top" class="logo dynamic-logo">UBE RAW</a>
        <div class="nav-links">
            <a href="#about">Vizyon</a>
            <a href="#portfolio">Portfolyo</a>
            <a href="#3d">360°</a>
            <a href="#contact">İletişim</a>
        </div>
    </nav>

    <section id="hero" style="text-align: center;">
        <h1 id="hero-title" style="font-size: clamp(3rem, 10vw, 6rem); letter-spacing: 20px; font-weight: 200; color: var(--accent);">UBE RAW</h1>
        <p id="hero-subtitle" style="font-size: 0.8rem; letter-spacing: 6px; opacity: 0.5; text-transform: uppercase;">Art & Design Studio</p>
    </section>

    <section id="about">
        <h2 class="section-title">Vizyon</h2>
        <div style="max-width: 800px; margin: 0 auto; text-align: center;">
            <p id="vision-text" style="font-weight: 200; font-size: 1.1rem; line-height: 2; color: #ccc;"></p>
        </div>
    </section>

    <section id="portfolio">
        <h2 class="section-title">Portfolyo</h2>
        <div class="filter-wrap" id="filter-container">
            <button class="filter-btn active" onclick="filterGallery('all', event)">Hepsi</button>
        </div>
        <div class="portfolio-grid" id="portfolio-container"></div>
    </section>

    <section id="3d">
        <h2 class="section-title">İnteraktif 3D</h2>
        <div class="viewer-container">
            <model-viewer id="main-viewer" src="" ar camera-controls auto-rotate shadow-intensity="1" style="width: 100%; height: 100%;"></model-viewer>
        </div>
    </section>

    <section id="contact" style="text-align: center;">
        <h2 class="section-title">İletişim</h2>
        <a id="contact-link" href="#" style="color: var(--accent); font-size: 1.8rem; text-decoration: none; letter-spacing: 2px;"></a>
        <p id="location-text" style="font-size: 0.7rem; color: var(--gray); letter-spacing: 3px; margin-top: 20px;"></p>
    </section>

    <footer>
        <div class="social-links" id="social-container"></div>
        <div class="copy">© 2026 <span class="dynamic-logo">UBE RAW</span>.</div>
    </footer>

    <script>
        const GITHUB_USER = "ubey53"; 
        const GITHUB_REPO = "uberaw-web";
        const v = "?v=" + Math.random(); // Cache-busting: Tarayıcıyı güncel veriye zorlar

        async function initSite() {
            try {
                // 1. TASARIM AYARLARI
                const appRes = await fetch('content/appearance.json' + v);
                if (appRes.ok) {
                    const style = await appRes.json();
                    if(style.accent_color) document.documentElement.style.setProperty('--accent', style.accent_color);
                    if(style.bg_color) document.documentElement.style.setProperty('--bg', style.bg_color);
                    if(style.logo_text) document.querySelectorAll('.dynamic-logo').forEach(l => l.innerText = style.logo_text);
                    const sCont = document.getElementById('social-container');
                    if(style.social_instagram) sCont.innerHTML += `<a href="${style.social_instagram}" target="_blank">INSTAGRAM</a>`;
                    if(style.social_portfolio) sCont.innerHTML += `<a href="${style.social_portfolio}" target="_blank">BEHANCE</a>`;
                }

                // 2. İÇERİK AYARLARI
                const setRes = await fetch('content/settings.json' + v);
                if (setRes.ok) {
                    const set = await setRes.json();
                    if(set.show_ticker) {
                        document.getElementById('ticker-bar').style.display = 'flex';
                        document.getElementById('ticker-text').innerText = set.ticker_text;
                        document.body.classList.add('has-ticker');
                    }
                    document.getElementById('hero-title').innerText = set.hero_title || "UBE RAW";
                    document.getElementById('hero-subtitle').innerText = set.hero_subtitle || "";
                    document.getElementById('vision-text').innerText = set.vision_text || "";
                    document.getElementById('contact-link').innerText = set.contact_email || "";
                    document.getElementById('contact-link').href = "mailto:" + set.contact_email;
                    document.getElementById('location-text').innerText = set.location || "RIZE";
                    document.getElementById('main-viewer').src = set.model_file || "";
                }

                // 3. KATEGORİLER
                const catRes = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/content/categories` + v);
                if (catRes.ok) {
                    const catFiles = await catRes.json();
                    const filterContainer = document.getElementById('filter-container');
                    for(let file of catFiles) {
                        if(file.name.endsWith('.json')) {
                            const res = await fetch(file.download_url + v);
                            const catData = await res.json();
                            const btn = document.createElement('button');
                            btn.className = 'filter-btn';
                            btn.innerText = catData.title;
                            btn.onclick = (e) => filterGallery(catData.id, e);
                            filterContainer.appendChild(btn);
                        }
                    }
                }

                await loadGallery();
            } catch (e) { console.error("Sistem hatası:", e); }
        }

        async function loadGallery() {
            const container = document.getElementById('portfolio-container');
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/portfolio` + v);
                if (!response.ok) return;
                const files = await response.json();
                container.innerHTML = '';

                for (let file of files) {
                    if (file.name.endsWith('.md')) {
                        const res = await fetch(file.download_url + v);
                        const content = await res.text();
                        
                        const title = content.match(/title:\s*"(.*)"/)?.[1] || content.match(/title:\s*(.*)/)?.[1];
                        let image = content.match(/image:\s*"(.*)"/)?.[1] || content.match(/image:\s*(.*)/)?.[1];
                        const cat = content.match(/category:\s*"(.*)"/)?.[1] || content.match(/category:\s*(.*)/)?.[1];
                        const status = content.match(/status:\s*"(.*)"/)?.[1] || content.match(/status:\s*(.*)/)?.[1];

                        if (image && image.startsWith('/')) image = image.substring(1);

                        const item = document.createElement('div');
                        item.className = 'portfolio-item';
                        item.dataset.category = cat;
                        item.innerHTML = `
                            <img src="${image}" alt="${title}" onerror="this.src='https://via.placeholder.com/450x450?text=UBE+RAW'">
                            <div class="portfolio-overlay">
                                <span>${status || ''}</span>
                                <h3>${title}</h3>
                            </div>
                        `;
                        container.appendChild(item);
                    }
                }
            } catch (e) { console.error("Galeri hatası."); }
        }

        function filterGallery(id, event) {
            const items = document.querySelectorAll('.portfolio-item');
            const btns = document.querySelectorAll('.filter-btn');
            btns.forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            items.forEach(item => {
                if(id === 'all' || item.dataset.category === id) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        window.addEventListener('DOMContentLoaded', initSite);
    </script>
</body>
</html>
