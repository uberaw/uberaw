<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">UBE RAW</title>
    <style>
        :root { --bg: #000; --text: #fff; --grey: #888; --border: #222; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, sans-serif; margin: 0; line-height: 1.6; }
        
        /* Navigation & Logo */
        nav { padding: 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo img { height: 40px; filter: brightness(0) invert(1); }
        .brand-name { letter-spacing: 8px; text-transform: uppercase; font-weight: 300; font-size: 24px; }

        /* News Section */
        #news-bar { background: #111; padding: 15px 40px; font-size: 14px; border-bottom: 1px solid var(--border); display: none; }
        .news-item { margin-bottom: 10px; border-left: 2px solid var(--text); padding-left: 15px; }

        /* Portfolio Grid */
        .container { padding: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }
        .artwork { position: relative; overflow: hidden; border: 1px solid var(--border); transition: 0.4s; }
        .artwork:hover { border-color: #555; transform: translateY(-5px); }
        .artwork img { width: 100%; height: 450px; object-fit: cover; display: block; }
        .artwork-info { padding: 20px; background: #000; }
        .artwork-title { font-weight: 500; text-transform: uppercase; letter-spacing: 2px; }
        .artwork-cat { font-size: 12px; color: var(--grey); text-transform: uppercase; margin-top: 5px; }

        /* Footer */
        footer { padding: 80px 40px; border-top: 1px solid var(--border); text-align: center; color: var(--grey); font-size: 12px; letter-spacing: 2px; }

        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            nav { flex-direction: column; text-align: center; gap: 20px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo" id="logo-container">
            <div class="brand-name">UBE RAW</div>
        </div>
        <div style="font-size: 13px; letter-spacing: 3px; color: var(--grey);">ART & DESIGN STUDIO</div>
    </nav>

    <div id="news-bar">
        <h4 style="margin:0 0 10px 0; font-size: 12px; color: #555;">GÜNCEL / DUYURULAR</h4>
        <div id="news-content"></div>
    </div>

    <div class="container">
        <div class="grid" id="portfolio-grid">
            </div>
    </div>

    <footer id="site-footer">
        </footer>

    <script>
        async function loadSite() {
            try {
                // 1. AYARLARI YÜKLE
                const setRes = await fetch('content/settings.json');
                const settings = await setRes.json();
                document.getElementById('page-title').innerText = settings.siteTitle;
                document.getElementById('site-footer').innerText = settings.footerText;
                if(settings.logoUrl) {
                    document.getElementById('logo-container').innerHTML = `<img src="${settings.logoUrl}" alt="Logo">`;
                }

                // 2. HABERLERİ YÜKLE
                const newsRes = await fetch('content/news.json');
                const newsData = await newsRes.json();
                if(newsData.announcements.length > 0) {
                    document.getElementById('news-bar').style.display = 'block';
                    document.getElementById('news-content').innerHTML = newsData.announcements.map(n => `
                        <div class="news-item">
                            <strong>${n.title}</strong> - <small>${n.date}</small><br>
                            <span style="color:#aaa">${n.body}</span>
                        </div>
                    `).reverse().join('');
                }

                // 3. PORTFOLYOYU YÜKLE
                const portRes = await fetch('content/portfolio.json');
                const portData = await portRes.json();
                const grid = document.getElementById('portfolio-grid');
                
                if(portData.projects.length === 0) {
                    grid.innerHTML = "<p style='color:#444'>Henüz eser eklenmedi.</p>";
                } else {
                    grid.innerHTML = portData.projects.map(p => `
                        <div class="artwork">
                            <img src="${p.image}" alt="${p.title}" loading="lazy">
                            <div class="artwork-info">
                                <div class="artwork-title">${p.title}</div>
                                <div class="artwork-cat">${p.category}</div>
                            </div>
                        </div>
                    `).reverse().join('');
                }

            } catch (error) {
                console.error("Yükleme hatası:", error);
            }
        }

        loadSite();
    </script>
</body>
</html>
