<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" id="meta-desc" content="UBE RAW | Art & Design Studio">
    <title id="site-title">UBE RAW | Art & Design Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;500&family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --text: #e5e5e5; --accent: #a87f4a; --border: #1e1e1e; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; scroll-behavior: smooth; }
        
        /* Bakım Modu */
        #maintenance-screen { position: fixed; inset: 0; background: #000; z-index: 999999; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #maintenance-screen h1 { font-family: 'Cormorant Garamond', serif; color: var(--accent); letter-spacing: 10px; text-transform: uppercase; margin-bottom: 10px; }

        /* Navigasyon */
        nav { padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.9); position: sticky; top:0; z-index: 1000; backdrop-filter: blur(10px); }
        .logo-container { cursor: pointer; display: flex; align-items: center; }
        .logo-container img { height: 40px; width: auto; object-fit: contain; }
        .logo-container h1 { font-family: 'Cormorant Garamond', serif; font-size: 24px; letter-spacing: 5px; margin: 0; color: var(--accent); text-transform: uppercase; }
        
        .nav-menu { display: flex; gap: 30px; align-items: center; }
        .nav-menu a { color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; text-decoration: none; transition: 0.3s; }
        .nav-menu a:hover { color: var(--accent); }

        /* Biyografi */
        .bio-sec { padding: 80px 5% 40px 5%; text-align: center; max-width: 800px; margin: 0 auto; color: #aaa; font-size: 14px; line-height: 1.8; display: none; }
        
        /* Filtreler */
        .filters { padding: 20px 5%; display: flex; justify-content: center; gap: 25px; overflow-x: auto; background: #000; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); position: sticky; top: 81px; z-index: 999; }
        .filter-btn { color: #555; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s; white-space: nowrap; padding-bottom: 5px; }
        .filter-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        /* Galeri Izgarası */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; padding: 40px 5%; }
        .artwork { border: 1px solid var(--border); background: #0d0d0d; position: relative; overflow: hidden; transition: 0.4s; display: flex; flex-direction: column; }
        .artwork:hover { border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Slider */
        .slider-container { position: relative; aspect-ratio: 1/1; overflow: hidden; background: #000; }
        .slider-track { display: flex; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; }
        .slider-track img { width: 100%; height: 100%; object-fit: cover; flex-shrink: 0; cursor: zoom-in; }
        .slider-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); color: var(--accent); border: none; width: 40px; height: 40px; cursor: pointer; font-size: 18px; z-index: 5; opacity: 0; transition: 0.3s; }
        .artwork:hover .slider-btn { opacity: 1; }
        .btn-prev { left: 0; } .btn-next { right: 0; }

        .info { padding: 25px; flex-grow: 1; display: flex; flex-direction: column; }
        .info p { font-size: 9px; color: var(--accent); text-transform: uppercase; margin: 0 0 5px 0; letter-spacing: 2px; font-weight: bold; }
        .info h3 { font-family: 'Cormorant Garamond', serif; font-size: 24px; margin: 0 0 10px 0; color: #fff; font-weight: 300; }
        .info .meta { font-size: 11px; color: #777; margin-bottom: 12px; line-height: 1.5; }
        .info .desc { font-size: 12px; color: #aaa; line-height: 1.6; margin-bottom: 20px; font-weight: 200; }
        
        .map-link { display: inline-block; margin-top: auto; font-size: 9px; color: var(--accent); text-decoration: none; border: 1px solid var(--accent); padding: 8px 15px; transition: 0.3s; letter-spacing: 1px; align-self: flex-start; }
        .map-link:hover { background: var(--accent); color: #000; }

        .sale-tag { background: var(--accent); color: #000; font-size: 10px; padding: 6px 12px; position: absolute; top: 15px; right: 15px; font-weight: 600; z-index: 10; letter-spacing: 1px; border-radius: 2px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .sale-tag.sold { background: #111; color: #aaa; border: 1px solid #444; }
        
        /* Sertifika & Guestbook Bölümleri */
        .cert-sec { padding: 80px 5%; background: #050505; border-top: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 40px; justify-content: center; }
        .cert-box { flex: 1; min-width: 300px; max-width: 500px; border: 1px solid var(--border); padding: 40px; text-align: center; background: #080808; }
        .cert-box h2 { font-family:'Cormorant Garamond'; color:var(--accent); letter-spacing: 3px; font-size: 24px; margin-bottom: 25px; font-weight: 300; }
        
        input, textarea { background: #000; border: 1px solid #222; color: #fff; padding: 14px; width: 100%; text-align: center; margin-bottom: 15px; box-sizing: border-box; font-family: inherit; font-size: 13px; }
        input:focus, textarea:focus { border-color: var(--accent); outline: none; }
        
        .btn-accent { background: var(--accent); border: none; padding: 14px 40px; color: #000; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; letter-spacing: 2px; width: 100%; transition: 0.3s; }
        .btn-accent:hover { filter: brightness(1.1); }

        .guestbook-list { padding: 40px 5%; text-align: center; max-width: 900px; margin: 0 auto; }
        .message-item { margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid #111; }
        .message-item p { font-size: 15px; font-style: italic; color: #ccc; margin-bottom: 10px; font-family: 'Cormorant Garamond', serif;}
        .message-item small { color: var(--accent); text-transform: uppercase; letter-spacing: 2px; font-size: 10px; }

        #lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 10000; padding: 20px; }
        #lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; border: 1px solid #222; }

        footer { padding: 60px 5%; text-align: center; color: #444; font-size: 10px; letter-spacing: 5px; border-top: 1px solid var(--border); text-transform: uppercase; }

        @media (max-width: 768px) {
            .nav-menu { display: none; } 
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="maintenance-screen">
    <h1 id="m-title">UNDER CONSTRUCTION</h1>
    <p style="color: #666; letter-spacing: 4px;">UBE RAW | STUDIO</p>
</div>

<nav>
    <div class="logo-container" id="logo-area" onclick="window.scrollTo(0,0)">
        <h1 id="text-logo">UBE RAW</h1>
    </div>
    <div class="nav-menu" id="nav-links">
        <a href="#main-grid" id="menu-port-text">WORKS</a>
        <a href="#cert-area" id="menu-cont-text">CONTACT</a>
        <div id="social-nav" style="display: inline-flex; gap: 15px; margin-left: 15px;"></div>
    </div>
</nav>

<div class="bio-sec" id="bio-sec"></div>
<div class="filters" id="cat-nav"></div>
<div class="grid" id="main-grid"></div>

<section class="cert-sec" id="cert-area">
    <div class="cert-box">
        <h2>VERIFICATION</h2>
        <p style="font-size: 11px; color: #666; margin-bottom: 20px;">Eserinizin orijinalliğini sertifika veya SKU kodu ile sorgulayın.</p>
        <input type="text" id="cert-input" placeholder="SERTİFİKA KODU (Örn: UBE-26-001)">
        <button class="btn-accent" onclick="checkCert()">SORGULA</button>
        <div id="cert-result" style="margin-top:20px; font-size: 12px;"></div>
    </div>

    <div class="cert-box">
        <h2>GUESTBOOK</h2>
        <p style="font-size: 11px; color: #666; margin-bottom: 20px;">Sanatımız hakkındaki düşüncelerinizi ziyaretçi defterimize bırakın.</p>
        <input type="text" id="g-name" placeholder="İSMİNİZ">
        <textarea id="g-msg" rows="3" placeholder="MESAJINIZ"></textarea>
        <button class="btn-accent" id="send-btn" onclick="sendGuest()">MESAJI GÖNDER</button>
    </div>
</section>

<div class="guestbook-list" id="guestbook-list"></div>

<div id="lightbox" onclick="this.style.display='none'"><img id="l-img"></div>
<footer id="footer-copy">UBE RAW ART & DESIGN</footer>

<script>
    // GitHub Pages kullanıyorsanız repo adını buraya ekleyin (örn: "/uberaw/"), aksi takdirde "" bırakın.
    const base = "/uberaw/"; 
    let allWorks = [];

    async function init() {
        try {
            // Sadece content klasöründen verileri çeker
            const [settings, portfolio, guestbookData] = await Promise.all([
                fetch(`${base}content/settings.json?v=${Date.now()}`).then(r => r.json()).catch(() => ({})),
                fetch(`${base}content/portfolio.json?v=${Date.now()}`).then(r => r.json()).catch(() => ({projects:[]})),
                fetch(`${base}content/guestbook.json?v=${Date.now()}`).then(r => r.json()).catch(() => ({messages:[]}))
            ]);

            // 1. Bakım Modu Kontrolü (Admin V4 ile uyumlu)
            if (settings.maintenance) {
                document.getElementById('maintenance-screen').style.display = 'flex';
                if(settings.title) document.getElementById('m-title').innerText = settings.title;
                return;
            }

            // 2. Tema ve Metin Uygulamaları
            if (settings.theme) document.documentElement.style.setProperty('--accent', settings.theme);
            
            document.getElementById('site-title').innerText = settings.title || "UBE RAW | Art & Design Studio";
            document.getElementById('footer-copy').innerText = settings.footer || "UBE RAW © 2026";
            document.getElementById('menu-port-text').innerText = settings.menuPortfolio || "WORKS";
            document.getElementById('menu-cont-text').innerText = settings.menuContact || "CONTACT";

            // Logo kontrolü
            const logoImg = new Image();
            logoImg.src = `${base}images/logo.png?v=${Date.now()}`;
            logoImg.onload = () => {
                document.getElementById('logo-area').innerHTML = `<img src="${logoImg.src}" alt="UBE RAW">`;
            };

            if (settings.bio) {
                const bio = document.getElementById('bio-sec');
                bio.innerHTML = settings.bio.replace(/\n/g, '<br>');
                bio.style.display = 'block';
            }

            // 3. Sosyal Medya
            let socialHTML = "";
            if (settings.instagram) socialHTML += `<a href="${settings.instagram.includes('http') ? settings.instagram : 'https://instagram.com/'+settings.instagram}" target="_blank" style="color:var(--accent)">IG</a>`;
            if (settings.whatsapp || settings.phone) {
                const phone = settings.whatsapp || settings.phone;
                socialHTML += `<a href="https://wa.me/${phone.replace(/[^0-9]/g, '')}" target="_blank" style="color:var(--accent)">WA</a>`;
            }
            if (settings.behance) socialHTML += `<a href="${settings.behance}" target="_blank" style="color:var(--accent)">BE</a>`;
            document.getElementById('social-nav').innerHTML = socialHTML;

            // 4. Eserler (Çöp Kutusundakileri, Gizlileri ve Taslakları Filtrele!)
            allWorks = (portfolio.projects || []).filter(w => !w.isDeleted && !w.isHidden && !w.isDraft);
            
            const cats = ['HEPSİ', ...new Set(allWorks.map(w => w.category).filter(c => c))];
            document.getElementById('cat-nav').innerHTML = cats.map(c => `
                <span class="filter-btn ${c==='HEPSİ'?'active':''}" onclick="render('${c}', this)">${c}</span>
            `).join('');

            // 5. Ziyaretçi Defteri (Admin panelden onaylananlar)
            if(guestbookData.messages && guestbookData.messages.length) {
                document.getElementById('guestbook-list').innerHTML = guestbookData.messages.map(g => `
                    <div class="message-item">
                        <p>"${g.message}"</p>
                        <small>— ${g.name} (${g.date || ''})</small>
                    </div>
                `).reverse().join('');
            }

            render('HEPSİ');
        } catch (err) {
            console.error("Veri yükleme hatası:", err);
        }
    }

    function render(cat, btn) {
        if(btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        
        const filtered = cat === 'HEPSİ' ? allWorks : allWorks.filter(w => w.category === cat);
        const grid = document.getElementById('main-grid');
        
        grid.innerHTML = filtered.map((w, idx) => {
            const imgs = (w.image || "").split(',');
            
            // Satış ve Fiyat Etiketi Mantığı
            let tagHtml = '';
            if (w.isSale) {
                tagHtml = `<div class="sale-tag sold">SATILDI</div>`;
            } else if (w.price) {
                tagHtml = `<div class="sale-tag">${w.price} ${w.currency || 'TRY'}</div>`;
            }

            // Meta Bilgiler (Materyal, Boyut vb.)
            let metaHtml = [];
            if(w.material) metaHtml.push(w.material);
            if(w.dimensions) metaHtml.push(w.dimensions);
            const metaStr = metaHtml.length > 0 ? `<div class="meta">${metaHtml.join(' | ')}</div>` : '';

            return `
            <div class="artwork">
                ${tagHtml}
                <div class="slider-container" id="slider-${idx}">
                    <div class="slider-track" id="track-${idx}">
                        ${imgs.map(img => `<img src="${base}${img.trim()}" onclick="openL(this.src)" loading="lazy">`).join('')}
                    </div>
                    ${imgs.length > 1 ? `
                        <button class="slider-btn btn-prev" onclick="moveSlider(${idx}, -1)">❮</button>
                        <button class="slider-btn btn-next" onclick="moveSlider(${idx}, 1)">❯</button>
                    ` : ''}
                </div>
                <div class="info">
                    <p>${w.category || 'ART'} ${w.subCategory ? `· ${w.subCategory}` : ''}</p>
                    <h3>${w.title}</h3>
                    ${metaStr}
                    ${w.description ? `<div class="desc">${w.description}</div>` : ''}
                    
                    ${w.mapLink ? `<a href="${w.mapLink}" target="_blank" class="map-link">📍 LOKASYON / SERGİ</a>` : ''}
                </div>
            </div>
        `}).join('');
    }

    let sliderPositions = {};
    function moveSlider(idx, dir) {
        const track = document.getElementById(`track-${idx}`);
        const count = track.querySelectorAll('img').length;
        if (sliderPositions[idx] === undefined) sliderPositions[idx] = 0;
        
        sliderPositions[idx] = (sliderPositions[idx] + dir + count) % count;
        track.style.transform = `translateX(-${sliderPositions[idx] * 100}%)`;
    }

    function openL(s) { 
        document.getElementById('l-img').src = s;
        document.getElementById('lightbox').style.display = 'flex'; 
    }

    function checkCert() {
        const val = document.getElementById('cert-input').value.trim().toUpperCase();
        if(!val) return;
        const match = allWorks.find(w => w.certCode?.toUpperCase() === val);
        const res = document.getElementById('cert-result');
        if(match) {
            res.innerHTML = `<span style="color:#4CAF50; font-weight:bold; letter-spacing: 1px;">✔ BU ESER ORİJİNALDİR: ${match.title}</span>`;
        } else {
            res.innerHTML = `<span style="color:#ff4444; letter-spacing: 1px;">✘ SİSTEMDE BÖYLE BİR KAYIT BULUNAMADI</span>`;
        }
    }

    // Formspree İletişim Formu (Mesajlar güvenli olarak toplanır)
    function sendGuest() {
        const name = document.getElementById('g-name').value.trim();
        const msg = document.getElementById('g-msg').value.trim();
        if(!name || !msg) return alert("Lütfen tüm alanları doldurun.");
        
        const btn = document.getElementById('send-btn');
        btn.innerText = "GÖNDERİLİYOR...";
        btn.disabled = true;
        
        // KENDI FORMSPREE KODUNUZ: mjgjewqn
        fetch("https://formspree.io/f/mjgjewqn", {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, message: msg, type: "Ziyaretçi Defteri Talebi" })
        }).then(() => {
            alert("Mesajınız bize ulaştı. Yönetici onayından sonra ziyaretçi defterinde yayınlanacaktır.");
            document.getElementById('g-name').value = "";
            document.getElementById('g-msg').value = "";
            btn.innerText = "MESAJI GÖNDER";
            btn.disabled = false;
        }).catch(() => {
            alert("Sunucu kaynaklı bir hata oluştu, lütfen daha sonra tekrar deneyin.");
            btn.disabled = false;
        });
    }

    init();
</script>
</body>
</html>
