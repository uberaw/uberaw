<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">UBE RAW</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;500&family=Inter:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --text: #fff; --grey: #666; --border: #1a1a1a; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; }
        
        nav { padding: 40px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top:0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 100; }
        .logo img { height: 30px; filter: invert(1); }
        .nav-links a { color: var(--grey); text-decoration: none; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; margin-left: 30px; transition: 0.3s; }
        .nav-links a:hover { color: #fff; }

        section { padding: 80px 5%; }
        .section-title { font-family: 'Cormorant Garamond', serif; font-size: 40px; font-weight: 300; margin-bottom: 50px; letter-spacing: 5px; text-align: center; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 40px; }
        .artwork { border: 1px solid var(--border); transition: 0.5s; overflow: hidden; }
        .artwork img { width: 100%; height: 400px; object-fit: cover; transition: 1s; }
        .artwork:hover img { transform: scale(1.05); }
        .artwork-info { padding: 20px; text-align: center; }
        .artwork-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; }

        #about { max-width: 800px; margin: 0 auto; line-height: 2; text-align: center; color: #ccc; }
        footer { padding: 60px; border-top: 1px solid var(--border); text-align: center; font-size: 10px; color: var(--grey); letter-spacing: 2px; }

        @media (max-width: 768px) { .nav-links { display: none; } .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav>
        <div id="site-logo-container"><h1 style="font-family:'Cormorant Garamond'; letter-spacing:5px; font-size:24px; margin:0;">UBE RAW</h1></div>
        <div class="nav-links">
            <a href="#portfolio">Portfolyo</a>
            <a href="#about-sec">Hakkımda</a>
            <a href="#contact">İletişim</a>
        </div>
    </nav>

    <section id="portfolio">
        <h2 class="section-title">SEÇKİLER</h2>
        <div class="grid" id="main-grid"></div>
    </section>

    <section id="about-sec" style="background: #050505;">
        <h2 class="section-title">MANIFESTO</h2>
        <div id="about"></div>
    </section>

    <section id="contact">
        <h2 class="section-title">İLETİŞİM</h2>
        <div id="contact-info" style="text-align: center; letter-spacing: 2px;"></div>
    </section>

    <footer id="footer-text"></footer>

    <script>
        const base = window.location.pathname.includes('uberaw') ? '/uberaw/' : '/';

        async function loadSite() {
            const [sRes, pRes] = await Promise.all([
                fetch(`${base}content/settings.json`),
                fetch(`${base}content/portfolio.json`)
            ]);
            
            const settings = await sRes.json();
            const port = await pRes.json();

            // Ayarları Yerleştir
            if(settings.logoUrl && settings.logoUrl.includes('http')) {
                document.getElementById('site-logo-container').innerHTML = `<img src="${settings.logoUrl}" style="height:30px;">`;
            }
            document.getElementById('about').innerText = settings.aboutText;
            document.getElementById('contact-info').innerText = settings.contactInfo;
            document.getElementById('footer-text').innerText = settings.footerText;

            // Portfolyoyu Yerleştir
            document.getElementById('main-grid').innerHTML = port.projects.map(p => `
                <div class="artwork">
                    <img src="${base}${p.image}" loading="lazy">
                    <div class="artwork-info">
                        <div class="artwork-title">${p.title}</div>
                        <div style="font-size:10px; color:#666; text-transform:uppercase; margin-top:5px;">${p.category}</div>
                    </div>
                </div>
            `).reverse().join('');
        }
        loadSite();
    </script>
</body>
</html>
