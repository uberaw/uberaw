<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" id="meta-desc" content="UBE RAW | Art & Design Studio">
    <title id="site-title">UBE RAW | Art & Design Studio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #050505; 
            --text: #d1d1d1; 
            --accent: #a87f4a; 
            --border: #1a1a1a; 
            --card: #0d0d0d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            line-height: 1.6;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- BAKIM MODU --- */
        #maintenance-screen { 
            position: fixed; inset: 0; background: #000; z-index: 999999; 
            display: none; flex-direction: column; justify-content: center; 
            align-items: center; text-align: center; padding: 20px;
        }
        #maintenance-screen h1 { 
            font-family: 'Cormorant Garamond', serif; 
            color: var(--accent); 
            font-size: clamp(24px, 5vw, 42px);
            letter-spacing: 8px; 
            margin-bottom: 15px; 
            text-transform: uppercase;
        }

        /* --- HEADER --- */
        header { 
            padding: 30px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; background: rgba(5,5,5,0.8); backdrop-filter: blur(15px); z-index: 100;
        }
        .logo { 
            font-family: 'Cormorant Garamond', serif; 
            font-size: 24px; 
            letter-spacing: 4px; 
            color: var(--accent); 
            text-decoration: none; 
            font-weight: 500;
            text-transform: uppercase;
        }
        nav { display: flex; gap: 25px; }
        nav a { 
            color: var(--text); 
            text-decoration: none; 
            font-size: 10px; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            transition: 0.3s;
            font-weight: 600;
        }
        nav a:hover { color: var(--accent); }

        /* --- HERO --- */
        .hero { 
            padding: 100px 5%; 
            text-align: center; 
            max-width: 1000px; 
            margin: 0 auto; 
        }
        .hero h1 { 
            font-family: 'Cormorant Garamond', serif; 
            font-size: clamp(28px, 5vw, 48px); 
            font-weight: 300; 
            margin-bottom: 30px; 
            font-style: italic; 
            color: #fff;
            line-height: 1.3;
        }
        .hero p { 
            font-size: 12px; 
            letter-spacing: 1px; 
            color: #777; 
            max-width: 700px; 
            margin: 0 auto;
            text-transform: uppercase;
        }

        /* --- GRID SİSTEMİ --- */
        .section-title { 
            padding: 60px 5% 20px; 
            font-family: 'Cormorant Garamond', serif; 
            font-size: 28px; 
            letter-spacing: 5px; 
            color: var(--accent); 
            text-transform: uppercase;
            text-align: center;
        }
        
        .portfolio-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); 
            gap: 1px; 
            background: var(--border);
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .project-card { 
            position: relative; 
            aspect-ratio: 1/1; 
            overflow: hidden; 
            cursor: pointer; 
            background: #000; 
        }
        .project-card img { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            transition: 1.2s cubic-bezier(0.2, 1, 0.3, 1);
            opacity: 0.7;
        }
        .project-card:hover img { transform: scale(1.08); opacity: 1; }
        
        .project-info { 
            position: absolute; inset: 0; 
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 60%); 
            display: flex; flex-direction: column; justify-content: flex-end; 
            padding: 30px; opacity: 0; transition: 0.4s; 
        }
        .project-card:hover .project-info { opacity: 1; }
        .project-info h3 { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: #fff; }
        .project-info p { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); }

        /* --- BİLGİ ALANLARI (News, Workshops, Guestbook) --- */
        .content-sections { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 0;
            border-bottom: 1px solid var(--border);
        }
        .info-box { padding: 60px 5%; border-right: 1px solid var(--border); }
        .info-box:last-child { border-right: none; }
        .info-box h3 { 
            font-family: 'Cormorant Garamond', serif; 
            font-size: 20px; margin-bottom: 30px; 
            color: var(--accent); letter-spacing: 3px; text-transform: uppercase;
        }

        .item-row { padding: 20px 0; border-bottom: 1px solid var(--border); }
        .item-row:last-child { border-bottom: none; }
        .item-row small { color: var(--accent); font-size: 9px; letter-spacing: 1px; text-transform: uppercase; }
        .item-row h4 { font-size: 15px; color: #eee; margin: 5px 0; font-weight: 400; }
        .item-row p { font-size: 13px; color: #666; }

        /* --- MODAL --- */
        .modal { 
            position: fixed; inset: 0; 
            background: #000; 
            z-index: 1000; 
            display: none; 
            overflow-y: auto; 
        }
        .close-modal { 
            position: fixed; top: 25px; right: 30px; 
            cursor: pointer; font-size: 35px; color: #fff; z-index: 1100;
        }
        .modal-content { 
            max-width: 1200px; margin: 80px auto; 
            display: grid; grid-template-columns: 1.2fr 1fr; gap: 50px; padding: 0 5%;
        }
        .modal-images { display: flex; flex-direction: column; gap: 15px; }
        .modal-images img { width: 100%; border: 1px solid var(--border); }
        
        .modal-details { position: sticky; top: 100px; height: fit-content; }
        .modal-details h2 { font-family: 'Cormorant Garamond', serif; font-size: 36px; color: var(--accent); margin-bottom: 15px; }
        .modal-details .price { font-size: 18px; color: #fff; margin-bottom: 20px; display: block; }
        .modal-details .desc { color: #888; font-size: 15px; white-space: pre-line; }

        /* --- SERTİFİKA & FOOTER --- */
        .cert-verify { 
            padding: 80px 5%; text-align: center; background: #030303; 
        }
        .cert-input { 
            background: transparent; border: none; border-bottom: 1px solid var(--border);
            padding: 10px; color: #fff; width: 100%; max-width: 300px; 
            text-align: center; font-size: 16px; margin-bottom: 20px;
        }
        .btn { 
            background: var(--accent); border: none; padding: 12px 30px; 
            color: #000; cursor: pointer; font-weight: 600; font-size: 11px; 
            letter-spacing: 2px; text-transform: uppercase;
        }

        footer { padding: 60px 5%; text-align: center; border-top: 1px solid var(--border); }
        .socials { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .socials a { color: #555; text-decoration: none; font-size: 10px; letter-spacing: 1px; }
        .socials a:hover { color: var(--accent); }

        @media (max-width: 800px) {
            .modal-content { grid-template-columns: 1fr; }
            .modal-details { position: relative; top: 0; }
            header { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

    <div id="maintenance-screen">
        <h1 id="m-title">GÜNCELENİYOR</h1>
        <p id="m-desc">Sanat durağımız kısa bir süreliğine bakımda.</p>
    </div>

    <header>
        <a href="#" class="logo" id="header-logo">UBE RAW</a>
        <nav id="main-nav">
            <a href="#portfolio" id="nav-port">WORKS</a>
            <a href="#info">JOURNAL</a>
            <a href="#contact" id="nav-cont">CONTACT</a>
        </nav>
    </header>

    <section class="hero">
        <h1 id="hero-bio">Yükleniyor...</h1>
        <p id="hero-desc">Art & Design Studio</p>
    </section>

    <div class="section-title" id="portfolio">PORTFOLIO</div>
    <div class="portfolio-grid" id="portfolio-grid"></div>

    <section class="content-sections" id="info">
        <div class="info-box">
            <h3>ANNOUNCEMENTS</h3>
            <div id="news-list"></div>
        </div>
        <div class="info-box">
            <h3>WORKSHOPS</h3>
            <div id="workshop-list"></div>
        </div>
        <div class="info-box">
            <h3>VISITORS</h3>
            <div id="guest-list"></div>
        </div>
    </section>

    <section class="cert-verify">
        <h3 style="margin-bottom:20px; font-family:'Cormorant Garamond'; letter-spacing:3px;">ESER DOĞRULAMA</h3>
        <input type="text" id="cert-code" class="cert-input" placeholder="Sertifika No Giriniz">
        <br>
        <button class="btn" onclick="checkCert()">DOĞRULA</button>
        <p id="cert-result" style="margin-top:20px; font-size:12px;"></p>
    </section>

    <footer id="contact">
        <div class="socials" id="social-links"></div>
        <div style="font-size:9px; color:#444; letter-spacing:2px;" id="footer-copy"></div>
    </footer>

    <div id="project-modal" class="modal">
        <span class="close-modal" onclick="closeModal()">×</span>
        <div class="modal-content" id="modal-inner"></div>
    </div>

    <script>
        let siteData = { settings: {}, portfolio: [], news: {}, workshops: [] };

        async function init() {
            try {
                const fetchJson = async (url) => {
                    const r = await fetch(url + '?v=' + Date.now());
                    return r.ok ? r.json() : null;
                };

                const [s, p, n, w] = await Promise.all([
                    fetchJson('content/settings.json'),
                    fetchJson('content/portfolio.json'),
                    fetchJson('content/news.json'),
                    fetchJson('content/workshops.json')
                ]);

                siteData.settings = s || {};
                siteData.portfolio = p ? (p.projects || []) : [];
                siteData.news = n || { announcements: [], guestbook: [] };
                siteData.workshops = w ? (w.workshops || []) : [];

                renderAll();
            } catch (err) {
                console.error("Veri yükleme hatası:", err);
            }
        }

        function renderAll() {
            const s = siteData.settings;
            
            // Ayarlar
            if(s.theme) document.documentElement.style.setProperty('--accent', s.theme);
            if(s.title) {
                document.getElementById('site-title').innerText = s.title;
                document.getElementById('header-logo').innerText = s.title;
            }
            if(s.bio) document.getElementById('hero-bio').innerText = s.bio;
            if(s.footer) document.getElementById('footer-copy').innerText = s.footer;
            if(s.maintenance) document.getElementById('maintenance-screen').style.display = 'flex';
            
            if(s.menuPortfolio) document.getElementById('nav-port').innerText = s.menuPortfolio;
            if(s.menuContact) document.getElementById('nav-cont').innerText = s.menuContact;

            // Sosyal Medya
            const socialWrap = document.getElementById('social-links');
            let socHtml = '';
            if(s.instagram) socHtml += `<a href="https://instagram.com/${s.instagram}" target="_blank">INSTAGRAM</a>`;
            if(s.behance) socHtml += `<a href="https://behance.net/${s.behance}" target="_blank">BEHANCE</a>`;
            if(s.whatsapp) socHtml += `<a href="https://wa.me/${s.whatsapp}" target="_blank">WHATSAPP</a>`;
            if(s.email) socHtml += `<a href="mailto:${s.email}">EMAIL</a>`;
            socialWrap.innerHTML = socHtml;

            // Portfolyo
            const grid = document.getElementById('portfolio-grid');
            grid.innerHTML = siteData.portfolio.map(p => {
                const firstImg = p.image ? p.image.split(',')[0].trim() : '';
                return `
                    <div class="project-card" onclick="openProject('${p.title}')">
                        <img src="${firstImg}" alt="${p.title}" loading="lazy">
                        <div class="project-info">
                            <p>${p.category}</p>
                            <h3>${p.title}</h3>
                        </div>
                    </div>
                `;
            }).join('');

            // Duyurular
            const nList = document.getElementById('news-list');
            const anns = siteData.news.announcements || [];
            nList.innerHTML = anns.length ? anns.map(a => `
                <div class="item-row">
                    <small>${a.date}</small>
                    <h4>${a.title}</h4>
                    <p>${a.content}</p>
                </div>
            `).join('') : '<p style="font-size:11px; color:#444;">Henüz duyuru yok.</p>';

            // Atölyeler
            const wList = document.getElementById('workshop-list');
            wList.innerHTML = siteData.workshops.length ? siteData.workshops.map(w => `
                <div class="item-row">
                    <small>${w.date} | ${w.location}</small>
                    <h4>${w.name}</h4>
                    <p>Kontenjan: ${w.enrolled || 0} / ${w.capacity}</p>
                </div>
            `).join('') : '<p style="font-size:11px; color:#444;">Planlanmış atölye yok.</p>';

            // Ziyaretçi Defteri
            const gList = document.getElementById('guest-list');
            const guests = siteData.news.guestbook || [];
            gList.innerHTML = guests.length ? guests.map(g => `
                <div class="item-row">
                    <small>${g.date}</small>
                    <h4>${g.name}</h4>
                    <p>"${g.content}"</p>
                </div>
            `).join('') : '<p style="font-size:11px; color:#444;">Henüz yorum yok.</p>';
        }

        function openProject(title) {
            const p = siteData.portfolio.find(x => x.title === title);
            if(!p) return;

            const modal = document.getElementById('project-modal');
            const inner = document.getElementById('modal-inner');
            
            const imgs = p.image ? p.image.split(',').map(src => `<img src="${src.trim()}" loading="lazy">`).join('') : '';

            inner.innerHTML = `
                <div class="modal-images">${imgs}</div>
                <div class="modal-details">
                    <p style="text-transform:uppercase; color:var(--accent); letter-spacing:2px; font-size:10px;">${p.category}</p>
                    <h2>${p.title}</h2>
                    ${p.price ? `<span class="price">${p.price}</span>` : ''}
                    <div class="desc">${p.description || 'Bu eser hakkında henüz detaylı bilgi girilmemiş.'}</div>
                    ${p.mapLink ? `<br><a href="${p.mapLink}" target="_blank" class="btn" style="display:inline-block; margin-top:20px; text-decoration:none;">KONUMU GÖR</a>` : ''}
                </div>
            `;
            
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('project-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function checkCert() {
            const code = document.getElementById('cert-code').value.trim().toUpperCase();
            const res = document.getElementById('cert-result');
            if(!code) return;

            const match = siteData.portfolio.find(p => p.certCode && p.certCode.toUpperCase() === code);
            if(match) {
                res.innerHTML = `<span style="color:#4CAF50">✔ ONAYLANDI: ${match.title}</span>`;
            } else {
                res.innerHTML = `<span style="color:#ff4444">✘ KAYIT BULUNAMADI</span>`;
            }
        }

        window.onclick = (e) => { if(e.target.className === 'modal') closeModal(); };
        window.onload = init;
    </script>
</body>
</html>
