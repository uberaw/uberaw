name: Guestbook Bot
on:
  repository_dispatch:
    types: [incoming_message]

jobs:
  add_entry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Update JSON
        run: |
          node -e "
            const fs = require('fs');
            const file = './content/guestbook.json';
            let data = { messages: [] };
            if (fs.existsSync(file)) {
              data = JSON.parse(fs.readFileSync(file, 'utf8'));
            }
            const newMsg = ${{ JSON.stringify(github.event.client_payload.data) }};
            // Onay bekliyor olarak (false) ekliyoruz
            data.messages.push({ 
              ...newMsg, 
              approved: false, 
              date: new Date().toLocaleDateString('tr-TR') 
            });
            fs.writeFileSync(file, JSON.stringify(data, null, 2));
          "
      - name: Commit & Push
        run: |
          git config user.name "Studio Bot"
          git config user.email "bot@uberaw.com"
          git add content/guestbook.json
          git commit -m "Yeni mesaj onay bekliyor (Otomatik)"
          git push
