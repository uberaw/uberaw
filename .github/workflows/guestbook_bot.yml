name: Secure Guestbook Bot
on:
  issues:
    types: [opened]

jobs:
  update_json:
    if: contains(github.event.issue.labels.*.name, 'guestbook')
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Çek
        uses: actions/checkout@v3

      - name: Veriyi İşle
        run: |
          node -e "
            const fs = require('fs');
            const file = './content/guestbook.json';
            const data = JSON.parse(fs.readFileSync(file, 'utf8'));
            if (!data.messages) data.messages = [];
            
            const body = \`${{ github.event.issue.body }}\`;
            // Formdan gelen 'Name:' ve 'Message:' satırlarını ayıkla
            const name = body.split('Name:')[1]?.split('\n')[0]?.trim();
            const message = body.split('Message:')[1]?.split('\n')[0]?.trim();
            
            if (name && message) {
              data.messages.push({
                name: name,
                message: message,
                date: new Date().toLocaleDateString('tr-TR'),
                approved: false
              });
              fs.writeFileSync(file, JSON.stringify(data, null, 2));
            }
          "

      - name: Konuyu Kapat
        run: gh issue close ${{ github.event.issue.number }} --comment "İşlendi ve panele eklendi."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Kaydet ve Gönder
        run: |
          git config user.name "Studio Bot"
          git config user.email "bot@uberaw.com"
          git add content/guestbook.json
          git commit -m "Otomatik: Yeni mesaj arşive eklendi"
          git push
