name: Secure Guestbook Bot
on:
  issues:
    types: [opened]

jobs:
  update_json:
    if: contains(github.event.issue.labels.*.name, 'guestbook')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Parse Issue and Update JSON
        run: |
          node -e "
            const fs = require('fs');
            const file = './content/guestbook.json';
            const data = JSON.parse(fs.readFileSync(file, 'utf8'));
            if (!data.messages) data.messages = [];
            
            // Issue gövdesinden (body) veriyi al
            const body = \`${{ github.event.issue.body }}\`;
            const nameMatch = body.match(/Adı:\s*(.*)/);
            const msgMatch = body.match(/Mesaj:\s*(.*)/);
            
            if (nameMatch && msgMatch) {
              const newMsg = {
                name: nameMatch[1].trim(),
                message: msgMatch[1].trim(),
                date: new Date().toLocaleDateString('tr-TR'),
                approved: false
              };
              data.messages.push(newMsg);
              fs.writeFileSync(file, JSON.stringify(data, null, 2));
            }
          "

      - name: Close Issue
        run: gh issue close ${{ github.event.issue.number }} --comment "İşlendi ve arşive eklendi."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit & Push
        run: |
          git config user.name "Studio Bot"
          git config user.email "bot@uberaw.com"
          git add content/guestbook.json
          git commit -m "Otomatik: Yeni mesaj eklendi"
          git push
