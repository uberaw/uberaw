<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>UBE RAW | Studio Command</title>
    <style>
        body { background: #000; color: #ccc; font-family: 'Inter', sans-serif; margin: 0; display: flex; }
        .sidebar { width: 220px; height: 100vh; border-right: 1px solid #222; padding: 30px; position: fixed; }
        .sidebar h2 { color: #a87f4a; font-size: 16px; letter-spacing: 4px; margin-bottom: 40px; }
        .nav-link { padding: 10px 0; cursor: pointer; font-size: 11px; text-transform: uppercase; color: #666; }
        .nav-link.active { color: #a87f4a; font-weight: bold; }
        .main { margin-left: 280px; padding: 60px; width: 100%; }
        .tab { display: none; } .tab.active { display: block; }
        .card { background: #0d0d0d; border: 1px solid #1a1a1a; padding: 25px; margin-bottom: 20px; }
        input, textarea { width: 100%; background: #000; border: 1px solid #222; color: #fff; padding: 12px; margin: 10px 0; }
        button { background: #a87f4a; color: #000; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #111; }
        .btn-del { color: #ff4444; cursor: pointer; font-size: 10px; text-transform: uppercase; }
        #login { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="login">
        <div style="width: 250px;">
            <input type="password" id="token" placeholder="GitHub Token">
            <button onclick="auth()">GİRİŞ</button>
        </div>
    </div>

    <div class="sidebar">
        <h2>UBE RAW</h2>
        <div class="nav-link" onclick="tab('sale', this)">Satış & Sertifika</div>
        <div class="nav-link" onclick="tab('guest', this)">Defteri Yönet</div>
        <div class="nav-link active" onclick="tab('add', this)">Eser Ekle</div>
        <div class="nav-link" onclick="tab('inv', this)">Envanter / Sil</div>
        <div class="nav-link" onclick="tab('config', this)">Site & Logo</div>
        <div id="tab-sale" class="tab">
    <h3>Satış Ayarları ve Sertifika</h3>
    <div class="card">
        <p>Eseri seçip satış bilgilerini güncelleyin (Bu kısım envanterle entegre çalışır).</p>
        <input type="text" id="edit-price" placeholder="Fiyat (Örn: 15.000 TL)">
        <input type="text" id="edit-edition" placeholder="Edisyon (Örn: 1/5)">
        <input type="text" id="edit-cert" placeholder="Sertifika No">
        <button onclick="saveSaleDetails()">Bilgileri Güncelle</button>
    </div>
</div>

<div id="tab-guest" class="tab">
    <h3>Gelen Mesajlar</h3>
    <div id="admin-guest-list" class="card">Mesajlar yükleniyor...</div>
</div>
    </div>

    <div class="main">
        <div id="tab-add" class="tab active">
            <h3>Yeni Kayıt</h3>
            <div class="card">
                <input type="file" id="f-file">
                <input type="text" id="f-title" placeholder="Eser Adı">
                <input type="text" id="f-cat" placeholder="Kategori">
                <button onclick="upload()">Yayınla</button>
            </div>
        </div>

        <div id="tab-inv" class="tab">
            <h3>Kayıtlı Eserler</h3>
            <div id="inventory-list" class="card">Yükleniyor...</div>
        </div>

        <div id="tab-config" class="tab">
            <h3>Site Kimliği</h3>
            <div class="card">
                <label>Logo Seçin</label><input type="file" id="l-file">
                <label>Site Başlığı</label><input type="text" id="s-title">
                <label>Footer</label><input type="text" id="s-footer">
                <button onclick="updateSettings()">Kaydet</button>
            </div>
        </div>
    </div>

    <script>
        const REPO = "uberaw/uberaw";
        
        async function get(path) {
            const t = localStorage.getItem('uber_t');
            const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}?t=${Date.now()}`, {
                headers: { 'Authorization': `token ${t}` }
            });
            return await r.json();
        }

        async function auth() {
            const t = document.getElementById('token').value || localStorage.getItem('uber_t');
            localStorage.setItem('uber_t', t);
            const d = await get('content/settings.json');
            if(d.sha) {
                document.getElementById('login').style.display='none';
                loadInv();
                const s = JSON.parse(atob(d.content));
                document.getElementById('s-title').value = s.siteTitle;
                document.getElementById('s-footer').value = s.footerText;
            }
        }

        async function loadInv() {
            const d = await get('content/portfolio.json');
            const p = JSON.parse(atob(d.content));
            document.getElementById('inventory-list').innerHTML = p.projects.map((x, i) => `
                <div class="item-row">
                    <span>${x.title} (${x.category})</span>
                    <span class="btn-del" onclick="deleteItem(${i})">Sil</span>
                </div>
            `).reverse().join('');
        }

        async function deleteItem(index) {
            if(!confirm("Eseri silmek istiyor musunuz?")) return;
            const t = localStorage.getItem('uber_t');
            const d = await get('content/portfolio.json');
            const p = JSON.parse(atob(d.content));
            p.projects.splice(p.projects.length - 1 - index, 1); // Reverse list mantığına göre silme
            
            await fetch(`https://api.github.com/repos/${REPO}/contents/content/portfolio.json`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${t}` },
                body: JSON.stringify({ message: "Delete item", content: btoa(JSON.stringify(p, null, 2)), sha: d.sha })
            });
            alert("Silindi!"); loadInv();
        }

        async function upload() {
            const t = localStorage.getItem('uber_t');
            const file = document.getElementById('f-file').files[0];
            const reader = new FileReader();
            reader.onload = async (e) => {
                const name = Date.now() + "_" + file.name;
                await fetch(`https://api.github.com/repos/${REPO}/contents/images/uploads/${name}`, {
                    method: 'PUT', headers: { 'Authorization': `token ${t}` },
                    body: JSON.stringify({ message: "Img", content: e.target.result.split(',')[1] })
                });
                const d = await get('content/portfolio.json');
                const p = JSON.parse(atob(d.content));
                p.projects.push({ title: document.getElementById('f-title').value, category: document.getElementById('f-cat').value, image: `images/uploads/${name}` });
                await fetch(`https://api.github.com/repos/${REPO}/contents/content/portfolio.json`, {
                    method: 'PUT', headers: { 'Authorization': `token ${t}` },
                    body: JSON.stringify({ message: "Add", content: btoa(JSON.stringify(p, null, 2)), sha: d.sha })
                });
                alert("Eklendi!"); loadInv();
            };
            reader.readAsDataURL(file);
        }

        async function updateSettings() {
            const t = localStorage.getItem('uber_t');
            const logoFile = document.getElementById('l-file').files[0];
            let logoUrl = "images/logo.png";

            if(logoFile) {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    await fetch(`https://api.github.com/repos/${REPO}/contents/images/logo.png`, {
                        method: 'PUT', headers: { 'Authorization': `token ${t}` },
                        body: JSON.stringify({ message: "Logo Update", content: e.target.result.split(',')[1], sha: (await get('images/logo.png')).sha })
                    });
                };
                reader.readAsDataURL(logoFile);
            }

            const d = await get('content/settings.json');
            const s = JSON.parse(atob(d.content));
            s.siteTitle = document.getElementById('s-title').value;
            s.footerText = document.getElementById('s-footer').value;
            s.logoUrl = "images/logo.png";

            await fetch(`https://api.github.com/repos/${REPO}/contents/settings.json`, {
                method: 'PUT', headers: { 'Authorization': `token ${t}` },
                body: JSON.stringify({ message: "Sets", content: btoa(JSON.stringify(s, null, 2)), sha: d.sha })
            });
            alert("Ayarlar güncellendi!");
        }

        function tab(n, el) {
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            document.getElementById('tab-'+n).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(x => x.classList.remove('active'));
            el.classList.add('active');
        }
async function saveSaleDetails() {
    const t = localStorage.getItem('uber_t');
    const d = await get('content/portfolio.json');
    const p = JSON.parse(atob(d.content));
    
    // En son eklenen eser üzerinden örnek işlem:
    const lastIdx = p.projects.length - 1;
    p.projects[lastIdx].price = document.getElementById('edit-price').value;
    p.projects[lastIdx].edition = document.getElementById('edit-edition').value;
    p.projects[lastIdx].certCode = document.getElementById('edit-cert').value;
    p.projects[lastIdx].isSale = true;

    await fetch(`https://api.github.com/repos/${REPO}/contents/content/portfolio.json`, {
        method: 'PUT',
        headers: { 'Authorization': `token ${t}` },
        body: JSON.stringify({ message: "Sale details update", content: btoa(JSON.stringify(p, null, 2)), sha: d.sha })
    });
    alert("Satış bilgileri kaydedildi!");
}
        if(localStorage.getItem('uber_t')) auth();
    </script>
</body>
</html>
