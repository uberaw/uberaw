<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>UBE RAW | Studio Admin v9</title>
    <style>
        :root { --bg: #000; --card: #0d0d0d; --border: #222; --accent: #fff; }
        body { background: var(--bg); color: #ccc; font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 240px; border-right: 1px solid var(--border); padding: 40px 20px; background: #050505; }
        .nav-link { padding: 12px; cursor: pointer; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; color: #666; }
        .nav-link.active { background: var(--accent); color: #000; font-weight: bold; }
        .main { flex: 1; padding: 60px; overflow-y: auto; }
        .tab { display: none; } .tab.active { display: block; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 25px; margin-bottom: 20px; }
        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; margin: 10px 0; box-sizing: border-box; }
        button { background: var(--accent); color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #login-overlay { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div style="width: 300px; text-align: center;">
            <h1 style="letter-spacing: 10px; color:#fff;">UBE RAW</h1>
            <input type="password" id="gh-token" placeholder="GitHub Access Token">
            <button onclick="init()">BAĞLAN</button>
        </div>
    </div>

    <div class="sidebar">
        <h2>STUDIO</h2>
        <div class="nav-link active" onclick="showTab('add', this)">Eser Yayınla</div>
        <div class="nav-link" onclick="showTab('news', this)">Haber/Duyuru</div>
        <div class="nav-link" onclick="showTab('settings', this)">Site Ayarları</div>
    </div>

    <div class="main">
        <div id="tab-add" class="tab active">
            <h3>Yeni Eser Kaydı</h3>
            <div class="card">
                <input type="file" id="f-file">
                <input type="text" id="f-title" placeholder="Eser Adı">
                <input type="text" id="f-cat" placeholder="Kategori (Heykel, Rölyef...)">
                <button onclick="uploadArtwork()">Yayınla</button>
            </div>
        </div>

        <div id="tab-news" class="tab">
            <h3>Güncel Haber & Sergi</h3>
            <div class="card">
                <input type="text" id="n-title" placeholder="Haber Başlığı">
                <textarea id="n-body" placeholder="Kısa içerik..."></textarea>
                <button onclick="updateNews()">Haberi Yayınla</button>
            </div>
        </div>

        <div id="tab-settings" class="tab">
            <h3>Site Kimliği</h3>
            <div class="card">
                <label>Site Başlığı</label><input type="text" id="s-title">
                <label>Manifesto (Hakkımda)</label><textarea id="s-about" rows="5"></textarea>
                <label>İletişim/Sosyal Medya</label><input type="text" id="s-contact">
                <label>Footer</label><input type="text" id="s-footer">
                <button onclick="saveSettings()">Tümünü Kaydet</button>
            </div>
        </div>
    </div>

    <script>
        const REPO = "uberaw/uberaw";

        async function getFile(path) {
            const token = localStorage.getItem('uber_t');
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}?t=${Date.now()}`, {
                headers: { 'Authorization': `token ${token}` }
            });
            return await res.json();
        }

        async function init() {
            const token = document.getElementById('gh-token').value || localStorage.getItem('uber_t');
            if(!token) return;
            localStorage.setItem('uber_t', token);
            try {
                const d = await getFile('content/settings.json');
                const s = JSON.parse(atob(d.content));
                document.getElementById('s-title').value = s.siteTitle;
                document.getElementById('s-about').value = s.aboutText;
                document.getElementById('s-contact').value = s.contactInfo;
                document.getElementById('s-footer').value = s.footerText;
                document.getElementById('login-overlay').style.display = 'none';
            } catch(e) { alert("Token geçersiz!"); }
        }

        async function push(path, content, message) {
            const token = localStorage.getItem('uber_t');
            const currentFile = await getFile(path);
            return await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}` },
                body: JSON.stringify({
                    message,
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))),
                    sha: currentFile.sha
                })
            });
        }

        async function uploadArtwork() {
            const file = document.getElementById('f-file').files[0];
            const title = document.getElementById('f-title').value;
            const cat = document.getElementById('f-cat').value;
            if(!file) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                const imgBase64 = e.target.result.split(',')[1];
                const fileName = Date.now() + "_" + file.name;
                const token = localStorage.getItem('uber_t');

                // 1. Resmi yükle
                await fetch(`https://api.github.com/repos/${REPO}/contents/images/uploads/${fileName}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}` },
                    body: JSON.stringify({ message: "Upload Image", content: imgBase64 })
                });

                // 2. Portfolyoyu güncelle
                const pData = await getFile('content/portfolio.json');
                const pJson = JSON.parse(atob(pData.content));
                pJson.projects.push({ title, category: cat, image: `images/uploads/${fileName}` });
                
                if((await push('content/portfolio.json', pJson, "Portfolio Update")).ok) {
                    alert("Eser Yayınlandı!");
                    location.reload();
                }
            };
            reader.readAsDataURL(file);
        }

        async function updateNews() {
            const nData = await getFile('content/news.json');
            const nJson = JSON.parse(atob(nData.content));
            nJson.announcements = [{ title: document.getElementById('n-title').value, body: document.getElementById('n-body').value }];
            if((await push('content/news.json', nJson, "News Update")).ok) alert("Haber Güncellendi!");
        }

        async function saveSettings() {
            const sJson = {
                siteTitle: document.getElementById('s-title').value,
                aboutText: document.getElementById('s-about').value,
                contactInfo: document.getElementById('s-contact').value,
                footerText: document.getElementById('s-footer').value,
                logoUrl: "images/logo.png"
            };
            if((await push('content/settings.json', sJson, "Settings Update")).ok) alert("Ayarlar Kaydedildi!");
        }

        function showTab(id, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('tab-'+id).classList.add('active');
            el.classList.add('active');
        }

        if(localStorage.getItem('uber_t')) init();
    </script>
</body>
</html>
