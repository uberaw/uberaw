<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>UBE RAW | Studio Admin</title>
    <style>
        :root { --bg: #000; --card: #0d0d0d; --border: #222; --accent: #fff; }
        body { background: var(--bg); color: #ccc; font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 240px; border-right: 1px solid var(--border); padding: 40px 20px; display: flex; flex-direction: column; gap: 10px; }
        .sidebar h2 { color: #fff; letter-spacing: 5px; font-weight: 300; font-size: 18px; margin-bottom: 30px; }
        .nav-link { padding: 12px; cursor: pointer; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; border-radius: 4px; transition: 0.3s; }
        .nav-link:hover { background: #111; color: #fff; }
        .nav-link.active { background: var(--accent); color: #000; font-weight: bold; }

        .content { flex: 1; padding: 60px; overflow-y: auto; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 30px; margin-bottom: 30px; }
        
        input, select, textarea { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; margin-bottom: 15px; border-radius: 4px; }
        button { background: var(--accent); color: #000; border: none; padding: 14px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        #preview { width: 100%; height: 200px; border: 1px dashed #333; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #preview img { max-height: 100%; max-width: 100%; }

        #login-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .status-msg { padding: 15px; border-radius: 4px; margin-bottom: 20px; display: none; font-size: 13px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div style="width: 300px; text-align: center;">
            <h1 style="letter-spacing: 10px; color:#fff;">UBE RAW</h1>
            <input type="password" id="gh-token" placeholder="GitHub Erişim Anahtarı">
            <button onclick="checkAccess()">STÜDYOYU AÇ</button>
        </div>
    </div>

    <div class="sidebar">
        <h2>UBE RAW</h2>
        <div class="nav-link active" onclick="tab('add')">Eser Ekle</div>
        <div class="nav-link" onclick="tab('list')">Envanter</div>
        <div class="nav-link" onclick="tab('site')">Site Ayarları</div>
    </div>

    <div class="content">
        <div id="status" class="status-msg"></div>

        <div id="tab-add" class="tab">
            <h3>Yeni Eser Kaydı</h3>
            <div class="card">
                <div id="preview">Görsel Seçilmedi</div>
                <input type="file" id="f-input" onchange="previewImg(this)">
                <input type="text" id="f-title" placeholder="Eser Adı">
                <input type="text" id="f-cat" placeholder="Kategori (Heykel, Portre vb.)">
                <button id="up-btn" onclick="upload()">Yayınla</button>
            </div>
        </div>

        <div id="tab-list" class="tab" style="display:none">
            <h3>Eserleri Yönet</h3>
            <div id="inv-list">Yükleniyor...</div>
        </div>
    </div>

    <script>
        const REPO = "uberaw/uberaw";
        let SHA = { portfolio: "" };

        async function checkAccess() {
            const t = document.getElementById('gh-token').value || localStorage.getItem('uber_t');
            if(!t) return;
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/content/portfolio.json`, {
                headers: { 'Authorization': `token ${t}` }
            });
            if(res.ok) {
                const d = await res.json();
                localStorage.setItem('uber_t', t);
                SHA.portfolio = d.sha;
                document.getElementById('login-overlay').style.display = 'none';
                loadInventory(JSON.parse(atob(d.content)));
            } else { alert("Erişim reddedildi!"); }
        }

        function previewImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('preview').innerHTML = `<img src="${e.target.result}">`;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function upload() {
            const btn = document.getElementById('up-btn');
            const file = document.getElementById('f-input').files[0];
            const title = document.getElementById('f-title').value;
            const cat = document.getElementById('f-cat').value;
            const token = localStorage.getItem('uber_t');

            if(!file || !title) return alert("Bilgileri doldurun!");
            
            btn.disabled = true;
            btn.innerText = "Yükleniyor...";

            const reader = new FileReader();
            reader.onload = async (e) => {
                const content = e.target.result.split(',')[1];
                const fileName = Date.now() + "_" + file.name;

                // 1. Resmi Yükle
                await fetch(`https://api.github.com/repos/${REPO}/contents/images/uploads/${fileName}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}` },
                    body: JSON.stringify({ message: "Upload", content })
                });

                // 2. JSON Güncelle
                const currentRes = await fetch(`https://api.github.com/repos/${REPO}/contents/content/portfolio.json`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                const currentData = await currentRes.json();
                const json = JSON.parse(atob(currentData.content));
                json.projects.push({ title, category: cat, image: `images/uploads/${fileName}` });

                const updateRes = await fetch(`https://api.github.com/repos/${REPO}/contents/content/portfolio.json`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}` },
                    body: JSON.stringify({
                        message: "Portfolio Update",
                        content: btoa(JSON.stringify(json, null, 2)),
                        sha: currentData.sha
                    })
                });

                if(updateRes.ok) {
                    alert("Başarıyla yayınlandı!");
                    location.reload();
                }
            };
            reader.readAsDataURL(file);
        }

        function tab(name) {
            document.querySelectorAll('.tab').forEach(t => t.style.display = 'none');
            document.getElementById('tab-' + name).style.display = 'block';
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            event.target.classList.add('active');
        }

        function loadInventory(data) {
            const list = document.getElementById('inv-list');
            list.innerHTML = data.projects.map((p, i) => `
                <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #222;">
                    <span>${p.title}</span>
                    <span style="color:red; cursor:pointer" onclick="deleteItem(${i})">Sil</span>
                </div>
            `).reverse().join('');
        }

        if(localStorage.getItem('uber_t')) checkAccess();
    </script>
</body>
</html>
