<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBE RAW | Master Studio</title>
    <style>
        :root { --bg: #000; --card: #0a0a0a; --accent: #fff; --border: #1a1a1a; --text: #ccc; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; }
        .sidebar { width: 220px; background: #000; height: 100vh; border-right: 1px solid var(--border); padding: 40px 20px; position: fixed; }
        .sidebar h2 { letter-spacing: 5px; font-weight: 300; border-bottom: 1px solid var(--border); padding-bottom: 20px; color: #fff; }
        .nav-btn { width: 100%; text-align: left; background: none; border: none; color: #555; padding: 12px 0; cursor: pointer; font-size: 13px; text-transform: uppercase; transition: 0.3s; }
        .nav-btn.active { color: var(--accent); font-weight: bold; }
        .main { margin-left: 260px; padding: 40px; width: 100%; max-width: 1000px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 25px; margin-bottom: 20px; }
        input, select, textarea { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 10px; margin: 8px 0; }
        button.primary { background: var(--accent); color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; }
        .item-list { border-top: 1px solid var(--border); margin-top: 20px; }
        .item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); align-items: center; }
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div id="login-screen">
    <div style="width: 280px; text-align: center;">
        <h1 style="letter-spacing: 8px; color:#fff;">UBE RAW</h1>
        <input type="password" id="tokenInput" placeholder="Erişim Anahtarı">
        <button class="primary" onclick="initSystem()">STUDIO'YU AÇ</button>
    </div>
</div>

<div class="sidebar">
    <h2>UBE RAW</h2>
    <button class="nav-btn active" onclick="showTab('portfolio')">Portfolyo</button>
    <button class="nav-btn" onclick="showTab('news')">Haber & Duyuru</button>
    <button class="nav-btn" onclick="showTab('settings')">Site Ayarları</button>
    <button class="nav-btn" style="margin-top:40px; color:#333;" onclick="logout()">Çıkış</button>
</div>

<div class="main">
    <div id="portfolio" class="tab-content active">
        <h3>Eser Yönetimi</h3>
        <div class="card">
            <input type="file" id="portFile" accept="image/*">
            <input type="text" id="portTitle" placeholder="Eser Adı">
            <input type="text" id="portCat" placeholder="Kategori (Heykel, Rölyef vb.)">
            <button class="primary" onclick="addPortfolio()">Eseri Yayınla</button>
        </div>
        <div id="portList" class="item-list"></div>
    </div>

    <div id="news" class="tab-content">
        <h3>Haber & Duyuru Yayınla</h3>
        <div class="card">
            <input type="text" id="newsTitle" placeholder="Duyuru Başlığı">
            <textarea id="newsContent" rows="4" placeholder="Duyuru içeriği veya önemli gelişme..."></textarea>
            <button class="primary" onclick="addNews()">Duyuruyu Paylaş</button>
        </div>
        <div id="newsList" class="item-list"></div>
    </div>

    <div id="settings" class="tab-content">
        <h3>Genel Site Ayarları</h3>
        <div class="card">
            <label>Site Başlığı</label>
            <input type="text" id="siteTitle">
            <label>Logo Değiştir (Yeni logo yükle)</label>
            <input type="file" id="logoFile" accept="image/*">
            <label>Alt Bilgi (Footer)</label>
            <input type="text" id="footerText">
            <button class="primary" onclick="saveSettings()">Ayarları Güncelle</button>
        </div>
    </div>
</div>

<script>
    const REPO = "ubey53/uberaw";
    let DATA = { portfolio: {}, settings: {}, news: {} };

    async function fetchData(path) {
        const token = localStorage.getItem('uber_token');
        const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
            headers: { 'Authorization': `token ${token}` }
        });
        const d = await res.json();
        return { sha: d.sha, content: JSON.parse(decodeURIComponent(escape(atob(d.content)))) };
    }

    async function initSystem() {
        const token = document.getElementById('tokenInput').value || localStorage.getItem('uber_token');
        if(!token) return;
        localStorage.setItem('uber_token', token);

        try {
            DATA.portfolio = await fetchData('content/portfolio.json');
            DATA.settings = await fetchData('content/settings.json');
            DATA.news = await fetchData('content/news.json');
            document.getElementById('login-screen').style.display = 'none';
            renderAll();
        } catch(e) { alert("Bağlantı hatası!"); }
    }

    function renderAll() {
        // Portfolyo listele
        document.getElementById('portList').innerHTML = DATA.portfolio.content.projects.map((p, i) => `
            <div class="item"><span>${p.title} (${p.category})</span><button onclick="deleteItem('portfolio', ${i})">Sil</button></div>
        `).reverse().join('');
        
        // Haber listele
        document.getElementById('newsList').innerHTML = DATA.news.content.announcements.map((n, i) => `
            <div class="item"><span>${n.title}</span><button onclick="deleteItem('news', ${i})">Kaldır</button></div>
        `).reverse().join('');

        // Ayarları doldur
        document.getElementById('siteTitle').value = DATA.settings.content.siteTitle;
        document.getElementById('footerText').value = DATA.settings.content.footerText;
    }

    async function pushToGit(path, content, sha) {
        const token = localStorage.getItem('uber_token');
        const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
            method: 'PUT',
            headers: { 'Authorization': `token ${token}` },
            body: JSON.stringify({ message: "Panel güncelleme", content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))), sha })
        });
        if(res.ok) { alert("Güncellendi!"); location.reload(); }
    }

    async function addPortfolio() {
        const file = document.getElementById('portFile').files[0];
        const title = document.getElementById('portTitle').value;
        const cat = document.getElementById('portCat').value;
        if(!file || !title) return;

        const reader = new FileReader();
        reader.onload = async (e) => {
            const imgContent = e.target.result.split(',')[1];
            const imgName = Date.now() + "_" + file.name;
            const token = localStorage.getItem('uber_token');
            
            // 1. Resmi yükle
            await fetch(`https://api.github.com/repos/${REPO}/contents/images/uploads/${imgName}`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}` },
                body: JSON.stringify({ message: "Eser görseli", content: imgContent })
            });

            // 2. JSON'u güncelle
            DATA.portfolio.content.projects.push({ title, category: cat, image: `images/uploads/${imgName}` });
            await pushToGit('content/portfolio.json', DATA.portfolio.content, DATA.portfolio.sha);
        };
        reader.readAsDataURL(file);
    }

    async function addNews() {
        const title = document.getElementById('newsTitle').value;
        const body = document.getElementById('newsContent').value;
        DATA.news.content.announcements.push({ title, body, date: new Date().toLocaleDateString('tr-TR') });
        await pushToGit('content/news.json', DATA.news.content, DATA.news.sha);
    }

    async function saveSettings() {
        DATA.settings.content.siteTitle = document.getElementById('siteTitle').value;
        DATA.settings.content.footerText = document.getElementById('footerText').value;
        
        const logoFile = document.getElementById('logoFile').files[0];
        if(logoFile) {
            const reader = new FileReader();
            reader.onload = async (e) => {
                const token = localStorage.getItem('uber_token');
                // Mevcut logo.png'yi üzerine yaz
                const logoRes = await fetch(`https://api.github.com/repos/${REPO}/contents/images/logo.png`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                const logoData = await logoRes.json();
                
                await fetch(`https://api.github.com/repos/${REPO}/contents/images/logo.png`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}` },
                    body: JSON.stringify({ message: "Logo güncelleme", content: e.target.result.split(',')[1], sha: logoData.sha })
                });
                await pushToGit('content/settings.json', DATA.settings.content, DATA.settings.sha);
            };
            reader.readAsDataURL(logoFile);
        } else {
            await pushToGit('content/settings.json', DATA.settings.content, DATA.settings.sha);
        }
    }

    async function deleteItem(type, index) {
        if(confirm("Emin misiniz?")) {
            if(type === 'portfolio') DATA.portfolio.content.projects.splice(index, 1);
            if(type === 'news') DATA.news.content.announcements.splice(index, 1);
            const path = type === 'portfolio' ? 'content/portfolio.json' : 'content/news.json';
            await pushToGit(path, DATA[type].content, DATA[type].sha);
        }
    }

    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function logout() { localStorage.removeItem('uber_token'); location.reload(); }
    if(localStorage.getItem('uber_token')) initSystem();
</script>
</body>
</html>
