<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>UBE RAW | Command Center</title>
    <style>
        body { background: #000; color: #ccc; font-family: 'Inter', sans-serif; margin: 0; display: flex; }
        .sidebar { width: 240px; height: 100vh; border-right: 1px solid #222; padding: 30px; position: fixed; background: #050505; }
        .sidebar h2 { color: #a87f4a; letter-spacing: 4px; font-size: 18px; }
        .nav-link { padding: 15px 0; cursor: pointer; font-size: 11px; text-transform: uppercase; color: #666; transition: 0.3s; }
        .nav-link.active { color: #a87f4a; font-weight: bold; }
        .main { margin-left: 300px; padding: 60px; width: 100%; max-width: 800px; }
        .tab { display: none; } .tab.active { display: block; }
        .card { background: #0d0d0d; border: 1px solid #1a1a1a; padding: 25px; margin-bottom: 20px; }
        input, select { width: 100%; background: #000; border: 1px solid #222; color: #fff; padding: 12px; margin: 10px 0; box-sizing: border-box; }
        button { background: #a87f4a; color: #000; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; }
        .item-row { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #111; font-size: 13px; }
        #login { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="login">
        <div style="width: 280px; text-align: center;">
            <h2 style="color:#a87f4a;">UBE RAW ADMIN</h2>
            <input type="password" id="token" placeholder="GitHub Token">
            <button onclick="auth()">GİRİŞ</button>
        </div>
    </div>

    <div class="sidebar">
        <h2>UBE RAW</h2>
        <div class="nav-link active" onclick="tab('add', this)">Eser Ekle</div>
        <div class="nav-link" onclick="tab('inv', this)">Envanter</div>
        <div class="nav-link" onclick="tab('sale', this)">Satış & Sertifika</div>
        <div class="nav-link" onclick="tab('config', this)">Ayarlar</div>
    </div>

    <div class="main">
        <div id="tab-add" class="tab active">
            <h3>Yeni Eser Yayınla</h3>
            <div class="card">
                <input type="file" id="f-file">
                <input type="text" id="f-title" placeholder="Eser Adı">
                <input type="text" id="f-cat" placeholder="Kategori">
                <button onclick="upload()">YÜKLE</button>
            </div>
        </div>

        <div id="tab-inv" class="tab">
            <h3>Envanter</h3>
            <div id="inventory-list" class="card">Yükleniyor...</div>
        </div>

        <div id="tab-sale" class="tab">
            <h3>Satış ve Sertifika Detayları</h3>
            <div class="card">
                <select id="sale-select" onchange="loadSaleData(this.value)"><option value="">Eser Seçin</option></select>
                <input type="text" id="edit-price" placeholder="Fiyat">
                <input type="text" id="edit-edition" placeholder="Edisyon (örn: 1/10)">
                <input type="text" id="edit-cert" placeholder="Sertifika No">
                <button onclick="saveSale()">GÜNCELLE</button>
            </div>
        </div>

        <div id="tab-config" class="tab">
            <h3>Site Ayarları</h3>
            <div class="card">
                <input type="text" id="s-footer" placeholder="Footer Metni">
                <button onclick="updateSettings()">KAYDET</button>
            </div>
        </div>
    </div>

    <script>
        const REPO = "uberaw/uberaw"; // BURAYI KONTROL EDİN
        let portfolio = { projects: [] };

        async function api(path, method = 'GET', body = null, sha = null) {
            const t = localStorage.getItem('uber_t');
            const options = {
                method,
                headers: { 'Authorization': `token ${t}`, 'Content-Type': 'application/json' }
            };
            if(body) options.body = JSON.stringify({ message: "Admin Update", content: btoa(unescape(encodeURIComponent(JSON.stringify(body, null, 2)))), sha });
            const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, options);
            return await r.json();
        }

        async function auth() {
            const t = document.getElementById('token').value || localStorage.getItem('uber_t');
            localStorage.setItem('uber_t', t);
            const d = await api('content/settings.json');
            if(d.sha) {
                document.getElementById('login').style.display='none';
                loadAll();
            }
        }

        async function loadAll() {
            const d = await api('content/portfolio.json');
            portfolio = JSON.parse(atob(d.content));
            
            // Envanter Listesi
            document.getElementById('inventory-list').innerHTML = portfolio.projects.map((x, i) => `
                <div class="item-row">
                    <span>${x.title}</span>
                    <span style="color:#ff4444; cursor:pointer" onclick="deleteItem(${i})">SİL</span>
                </div>
            `).reverse().join('');

            // Satış Seçimi
            document.getElementById('sale-select').innerHTML = '<option value="">Eser Seçin</option>' + 
                portfolio.projects.map((x, i) => `<option value="${i}">${x.title}</option>`).join('');
        }

        async function upload() {
            const file = document.getElementById('f-file').files[0];
            if(!file) return alert("Dosya seçin");
            const reader = new FileReader();
            reader.onload = async (e) => {
                const fileName = `images/uploads/${Date.now()}_${file.name}`;
                const t = localStorage.getItem('uber_t');
                // Resmi yükle
                await fetch(`https://api.github.com/repos/${REPO}/contents/${fileName}`, {
                    method: 'PUT', headers: { 'Authorization': `token ${t}` },
                    body: JSON.stringify({ message: "Upload Img", content: e.target.result.split(',')[1] })
                });
                // JSON'a ekle
                const d = await api('content/portfolio.json');
                portfolio.projects.push({ 
                    title: document.getElementById('f-title').value, 
                    category: document.getElementById('f-cat').value, 
                    image: fileName,
                    isSale: false 
                });
                await api('content/portfolio.json', 'PUT', portfolio, d.sha);
                alert("Başarıyla eklendi!"); loadAll();
            };
            reader.readAsDataURL(file);
        }

        async function saveSale() {
            const idx = document.getElementById('sale-select').value;
            if(idx === "") return;
            const d = await api('content/portfolio.json');
            portfolio.projects[idx].price = document.getElementById('edit-price').value;
            portfolio.projects[idx].edition = document.getElementById('edit-edition').value;
            portfolio.projects[idx].certCode = document.getElementById('edit-cert').value;
            portfolio.projects[idx].isSale = true;
            await api('content/portfolio.json', 'PUT', portfolio, d.sha);
            alert("Güncellendi!");
        }

        async function deleteItem(idx) {
            if(!confirm("Silinsin mi?")) return;
            const d = await api('content/portfolio.json');
            portfolio.projects.splice(idx, 1);
            await api('content/portfolio.json', 'PUT', portfolio, d.sha);
            loadAll();
        }

        function tab(n, el) {
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            document.getElementById('tab-'+n).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(x => x.classList.remove('active'));
            el.classList.add('active');
        }

        function loadSaleData(i) {
            if(i==="") return;
            const item = portfolio.projects[i];
            document.getElementById('edit-price').value = item.price || "";
            document.getElementById('edit-edition').value = item.edition || "";
            document.getElementById('edit-cert').value = item.certCode || "";
        }

        if(localStorage.getItem('uber_t')) auth();
    </script>
</body>
</html>
